name: Publish

on:
  push:
    tags:
      - "v*"
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Set publish variables
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - run: npm version "${{ steps.vars.outputs.version }}" --workspaces --no-git-tag-version

      - run: npm run build

      - name: Publish cesr
        run: npm publish --provenance --tag "${{ steps.vars.outputs.tag }}"
        working-directory: packages/cesr

      - name: Publish keri
        run: npm publish --provenance --tag "${{ steps.vars.outputs.tag }}"
        working-directory: packages/keri
